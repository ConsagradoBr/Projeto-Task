<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>SPA ToDo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <section id="loginPanel" class="card login-card" style="display:none;">
      <h1>Login</h1>
      <p class="subtitle">
        Usuario: <strong>aluno</strong> | Senha: <strong>senha123</strong>
      </p>

      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Digite o usuario" autocomplete="username" />

      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite a senha" autocomplete="current-password" />

      <button id="btnLogin">Entrar</button>
      <p class="error" id="loginMsg" style="display:none;"></p>
    </section>

    <section id="appPanel" class="card" style="display:none;">
      <header class="app-header">
        <h2 class="app-title">Minhas Tarefas</h2>
        <button id="btnLogout" class="button-ghost">Sair</button>
      </header>

      <div class="task-composer">
        <input id="newTask" class="input-mini" placeholder="Nova tarefa" />
        <button id="btnAdd" class="button-inline">Adicionar</button>
      </div>

      <section class="filter-row" aria-label="Filtros de tarefas">
        <label class="filter-row-label">Filtrar:</label>

        <input type="hidden" id="filter" value="todas" />

        <div class="filter-group" role="tablist" aria-label="Filtrar tarefas">
          <button type="button" class="filter-chip is-active" data-filter="todas" data-label="Todas" aria-pressed="true">Todas</button>
          <button type="button" class="filter-chip" data-filter="pendentes" data-label="Pendentes" aria-pressed="false">Pendentes</button>
          <button type="button" class="filter-chip" data-filter="concluidas" data-label="Concluidas" aria-pressed="false">Concluidas</button>
        </div>
      </section>

      <ul id="taskList" class="task-list"></ul>
    </section>
  </div>

  <script src="apps.js"></script>
</body>

</html>
